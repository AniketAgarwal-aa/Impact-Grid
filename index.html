<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- App Title -->
    <title>Impact Grid - Enterprise Change Impact Simulator</title>

    <!-- SEO -->
    <meta
      name="description"
      content="AI-powered requirement change simulation for modern software teams. Analyze cost, time, and risk instantly."
    />
    <meta name="author" content="ImpactSim" />

    <!-- Open Graph (for LinkedIn, Facebook, etc.) -->
    <meta property="og:title" content="ImpactSim - Requirement Change Impact Simulator" />
    <meta
      property="og:description"
      content="Simulate requirement changes and instantly see cost, time, and risk impact."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ImpactSim - Requirement Change Impact Simulator" />
    <meta
      name="twitter:description"
      content="AI-powered requirement change simulation for modern software teams."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Theme color (for mobile browsers) -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Prevent light-flash: apply theme before React loads -->
    <script>
      (function () {
        try {
          var key = "impactsensei-theme";
          var saved = localStorage.getItem(key);
          var systemDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = saved === "light" || saved === "dark" ? saved : systemDark ? "dark" : "light";
          if (theme === "dark") document.documentElement.classList.add("dark");
          else document.documentElement.classList.remove("dark");
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
